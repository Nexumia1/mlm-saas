services:
  - type: web
    name: mlm-saas-api
    env: node
    plan: free
    buildCommand: echo "No build needed"
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

version: '3.9'

services:
  # ─────────────────────────────────────────
  # BASE DE DATOS POSTGRESQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mlm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlm_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-mlm_saas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlm_user} -d ${POSTGRES_DB:-mlm_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # REDIS (caché + colas BullMQ)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mlm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass_2024} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_pass_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MONGODB (logs WhatsApp y eventos)
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mlm-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mlm_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo_pass_2024}
      MONGO_INITDB_DATABASE: mlm_logs
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  # ─────────────────────────────────────────
  # API BACKEND (NestJS)
  # ─────────────────────────────────────────
  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: mlm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlm_user}:${POSTGRES_PASSWORD:-mlm_pass_2024}@postgres:5432/${POSTGRES_DB:-mlm_saas}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_cambiar_en_produccion}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_cambiar_en_produccion}
      JWT_EXPIRES_IN: 15m
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ../apps/api:/app/apps/api:ro  # Hot reload en desarrollo
    command: npm run dev

  # ─────────────────────────────────────────
  # FRONTEND (Next.js)
  # ─────────────────────────────────────────
  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    container_name: mlm-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"

  # ─────────────────────────────────────────
  # NGINX (proxy reverso)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mlm-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  redis_data:
  mongo_data:
